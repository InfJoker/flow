name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - channel-server
          - app
          - prototype

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: npm audit (${{ matrix.project }})
        run: npm audit --audit-level=moderate
        working-directory: ${{ matrix.project }}
